substitutions:
  _SERVICE_NAME: jewelry-store
  _REGION: us-west2
  _IMAGE_NAME: us-west2-docker.pkg.dev/${PROJECT_ID}/app/jewelry-store

steps:
  # Step 1: Install dependencies
  - name: "node:20"
    entrypoint: "npm"
    args: ["ci"]
    id: "install-dependencies"

  # Step 2: Run linting
  - name: "node:20"
    entrypoint: "npm"
    args: ["run", "lint"]
    id: "lint"
    waitFor: ["install-dependencies"]

  # Step 3: Build application
  - name: "node:20"
    entrypoint: "npm"
    args: ["run", "build"]
    id: "build"
    waitFor: ["lint"]

  # Step 4: Generate unique image tag
  - name: "bash"
    id: "generate-tag"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        IMAGE_TAG="rev-$${TIMESTAMP}"
        echo "Generated tag: $${IMAGE_TAG}"
        echo "$${IMAGE_TAG}" > /workspace/image_tag.txt
        echo "Image: ${_IMAGE_NAME}:$${IMAGE_TAG}"
    waitFor: ["-"]

  # Step 5: Build and push the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-push"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        IMAGE_TAG=$(cat /workspace/image_tag.txt)
        docker build -t ${_IMAGE_NAME}:$${IMAGE_TAG} .
        docker push ${_IMAGE_NAME}:$${IMAGE_TAG}
    waitFor: ["build", "generate-tag"]

  # Step 6: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-service"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        IMAGE_TAG=$(cat /workspace/image_tag.txt)
        FULL_IMAGE_NAME="${_IMAGE_NAME}:$${IMAGE_TAG}"

        echo "Deploying service '${_SERVICE_NAME}'..."
        gcloud run deploy ${_SERVICE_NAME} \
          --image $${FULL_IMAGE_NAME} \
          --region ${_REGION} \
          --platform managed \
          --port 3000 \
          --memory 1Gi \
          --cpu 1 \
          --max-instances 5 \
          --min-instances 0 \
          --concurrency 80 \
          --set-env-vars "NODE_ENV=production,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},NEXT_PUBLIC_BUILD_ID=$${IMAGE_TAG}" \
          --revision-suffix $${IMAGE_TAG} \
          --timeout 300

        # Route 100% traffic to the latest revision
        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region ${_REGION} \
          --to-latest

        echo "Deployment completed successfully!"
    waitFor: ["build-push"]

  # Step 7: Cleanup old images
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup-images"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Cleaning up old images (keeping last 5)..."
        # Get list of image tags sorted by timestamp, skip first 5 (keep them)
        OLD_TAGS=$(gcloud container images list-tags ${_IMAGE_NAME} \
          --sort-by=TIMESTAMP \
          --limit=999999 \
          --format="get(tags[0])" | \
        tail -n +6)

        if [ -n "$$OLD_TAGS" ]; then
          echo "$$OLD_TAGS" | while read -r tag; do
            if [ -n "$$tag" ]; then
              echo "Deleting old image: ${_IMAGE_NAME}:$$tag"
              gcloud container images delete ${_IMAGE_NAME}:$$tag --force-delete-tags --quiet || echo "Failed to delete $$tag"
            fi
          done
        else
          echo "No old images to delete."
        fi
    waitFor: ["deploy-service"]

  # Step 8: Cleanup old revisions to prevent idle costs
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup-old-revisions"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Cleaning up old Cloud Run revisions (keeping latest)..."
        LATEST_REV=$(gcloud run services describe ${_SERVICE_NAME} --region ${_REGION} --format='value(status.latestReadyRevisionName)')
        if [ -z "$$LATEST_REV" ]; then
          echo "Could not determine latest revision; skipping cleanup."
        else
          gcloud run revisions list --service ${_SERVICE_NAME} --region ${_REGION} --format='value(metadata.name)' \
          | grep -v "$$LATEST_REV" \
          | while read -r REV; do
              if [ -n "$$REV" ]; then
                echo "Deleting old revision: $$REV"
                gcloud run revisions delete "$$REV" --region ${_REGION} --quiet || echo "Failed to delete $$REV"
              fi
            done
        fi
    waitFor: ["deploy-service"]

options:
  logging: CLOUD_LOGGING_ONLY
